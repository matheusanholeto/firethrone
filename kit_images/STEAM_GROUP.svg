  <path d="M220 198 L238 198 L238 180" stroke="#4A90D9" stroke-width="2.5" fill="none"/>
  
  <!-- Main shape -->
  
        <circle cx="120" cy="95" r="45" fill="none" stroke="#4A90D9" stroke-width="6" opacity="0.8"/>
