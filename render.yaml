services:
  - type: web
    name: firethrone
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      # ── GERADOS AUTOMATICAMENTE PELO RENDER ───────────────
      - key: SECRET_KEY
        generateValue: true

      - key: SYNC_SECRET
        generateValue: true

      # ── PREENCHER NO PAINEL DO RENDER ─────────────────────
      # Admin inicial do site
      - key: ADMIN_EMAIL
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: ADMIN_USERNAME
        sync: false

      # MongoDB Atlas connection string
      - key: MONGO_URI
        sync: false

      # Steam API (opcional, para login via Steam)
      - key: STEAM_API_KEY
        sync: false

      # URL pública do site (sem barra no final)
      # Exemplo: https://firethrone-server.onrender.com
      - key: SITE_URL
        sync: false

      # CORS: mesma URL do site
      - key: ALLOWED_ORIGIN
        sync: false

      # ── EMAIL (Brevo / Sendinblue) ─────────────────────────
      # Chave de API do Brevo: https://app.brevo.com/settings/keys/api
      # IMPORTANTE: O email em EMAIL_FROM precisa estar verificado no Brevo!
      # Verificar em: https://app.brevo.com/senders/domain/list
      - key: BREVO_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false
